<!DOCTYPE html>
<html>
<head>
  <title>ORYX Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at top left,#0F2B5B 0%,#020817 40%),
    radial-gradient(circle at bottom right,#081B38 0%,#020817 35%),
    #020817;

  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:white;
}

body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:
  linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

  background-size:40px 40px;
  opacity:0.15;
}

.container{

  width:520px;

  position:relative;
  z-index:2;

  display:flex;
  flex-direction:column;
  align-items:center;
}

.logo{

  width:520px;

  margin-bottom:-140px;

  position:relative;
  z-index:10;

  filter:
    drop-shadow(0 0 45px rgba(61,165,255,1))
    drop-shadow(0 0 120px rgba(61,165,255,0.65));

  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0px);}
}
.login-box{

  width:100%;

  background:rgba(7,15,30,0.82);

  border:1px solid rgba(61,165,255,0.22);

  backdrop-filter:blur(18px);

 padding:
  170px
  35px
  35px
  35px;

  margin-top:-20px;

  border-radius:28px;

  box-shadow:
    0 0 35px rgba(61,165,255,0.14),
    inset 0 0 30px rgba(255,255,255,0.03);
}

input{
  width:100%;
  padding:16px;
  margin:12px 0;

  border-radius:14px;

  border:1px solid rgba(61,165,255,0.15);

  background:rgba(255,255,255,0.04);

  color:#EAF4FF;

  outline:none;

  font-size:15px;

  transition:0.3s;
}

input:focus{
  border-color:#3DA5FF;

  box-shadow:
    0 0 12px rgba(61,165,255,0.4);

  background:rgba(255,255,255,0.06);
}

button{
  width:100%;
  padding:16px;
  margin-top:18px;

  border:none;
  border-radius:14px;

  background:linear-gradient(
    135deg,
    #1E90FF,
    #3DA5FF
  );

  color:white;

  font-weight:600;

  cursor:pointer;

  transition:0.3s;

  font-size:16px;

  letter-spacing:1px;
}

button:hover{
  transform:translateY(-2px);

  box-shadow:
    0 0 18px rgba(61,165,255,0.6);
}

.links{
  margin-top:16px;

  display:flex;
  justify-content:space-between;

  font-size:12px;

  color:#8FB8E8;
}

  </style>
</head>

<body>

<div class="container">


  <img src="{{ url_for('static', filename='ChatGPT_Image_May_7__2026__05_03_19_PM-removebg-preview.png') }}" class="logo">

  <div class="login-box">

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <div id="otpSection" style="display:none;">

  <input
    type="text"
    id="otp"
    placeholder="Enter Verification Code">

  <button onclick="verifyOTP()">
    Verify Code
  </button>

</div>

    <div class="links">
      <span>Forgot Password?</span>
      <span>Need Help?</span>
    </div>

  </div>

</div>

<script>
async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const response = await fetch("/login", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      email,
      password
    })

  });

  const data = await response.json();

  if (response.ok) {

    localStorage.setItem("temp_email", email);

    document.getElementById("otpSection").style.display = "block";

    alert("Verification code sent to your email");

  } else {

    alert(data.message);

  }
}



async function verifyOTP() {

  const otp = document.getElementById("otp").value;

  const email = localStorage.getItem("temp_email");

  const response = await fetch("/verify_otp", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      email: email,
      otp: otp
    })

  });

  const data = await response.json();

  if (response.ok) {

    localStorage.setItem("email", data.email);
    localStorage.setItem("role", data.role);

    if (data.role === "oryx_admin") {

      window.location.href = "/admin";

    } else if (data.role === "police_admin") {

      window.location.href = "/police";

    } else {

      window.location.href = "/officer";

    }

  } else {

    alert(data.message);

  }
}
</script>

</body>
</html>
