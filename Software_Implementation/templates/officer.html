<!DOCTYPE html>
<html>
<head>
<title>ORYX System - Officer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: 'Poppins', sans-serif;
        background: radial-gradient(circle at top left,#0F2B5B 0%,#020817 40%),
                    radial-gradient(circle at bottom right,#081B38 0%,#020817 35%),
                    #020817;
        color: white;
        overflow-x: hidden;
    }

    body::before {
        content: "";
        position: fixed;
        width: 100%;
        height: 100%;
        background: linear-gradient(rgba(61,165,255,0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(61,165,255,0.04) 1px, transparent 1px);
        background-size: 50px 50px;
        opacity: 0.15;
        pointer-events: none;
        z-index: -1;
    }

    /* TOPBAR */
    .topbar {
        height: 62px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
        background: rgba(3,10,20,0.95);
        border-bottom: 1px solid rgba(61,165,255,0.1);
        backdrop-filter: blur(12px);
        z-index: 100;
    }

    .top-left { display: flex; align-items: center; gap: 16px; }
    .hamburger { font-size: 26px; color: white; cursor: pointer; }
    .topbar-logo { height: 38px; filter: drop-shadow(0 0 15px rgba(61,165,255,0.7)); }

    /* SIDEBAR */
    .sidebar {
        width: 265px;
        background: linear-gradient(180deg, rgba(3,12,25,0.98), rgba(2,8,18,0.98));
        border-right: 1px solid rgba(61,165,255,0.1);
        transition: all 0.4s ease;
        padding: 20px 14px;
        display: flex;
        flex-direction: column;
        height: calc(100vh - 62px);
        position: fixed;
        left: 0;
        top: 62px;
        overflow-y: auto;
        z-index: 90;
    }

    .sidebar.closed { transform: translateX(-100%); }

    .sidebar-logo { width: 200px; margin: 10px auto 25px auto; display: block; }

    .sidebar button {
        background: transparent;
        border: none;
        color: #EAF4FF;
        padding: 14px 18px;
        border-radius: 12px;
        text-align: left;
        cursor: pointer;
        font-size: 15.5px;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 6px;
        transition: 0.3s;
    }

    .sidebar button:hover,
    .sidebar button.active-btn {
        background: linear-gradient(90deg, rgba(30,144,255,0.35), rgba(61,165,255,0.12));
        color: white;
    }

   
    .main {
        margin-left: 265px;
        padding: 25px;
        transition: all 0.4s ease;
        min-height: calc(100vh - 62px);
    }

    .main.full { margin-left: 0; }

    .card {
        background: rgba(5,12,24,0.95);
        border: 1px solid rgba(61,165,255,0.15);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 25px;
    }

    .card h3 {
        color: #EAF4FF;
        margin-bottom: 18px;
        font-size: 20px;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 16px;
        margin-top: 20px;
    }

    .stat-card {
        background: rgba(255,255,255,0.06);
        padding: 20px;
        border-radius: 12px;
        text-align: center;
    }

    .stat-number {
        font-size: 32px;
        font-weight: 700;
        color: #60a5ff;
    }

    #suspectImg {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 14px;
        border: 1px solid rgba(61,165,255,0.15);
    }

    .wanted-badge {
        background: #7c1010;
        color: #ff7272;
        padding: 8px 14px;
        border-radius: 10px;
        display: inline-block;
        margin: 12px 0;
        font-weight: 600;
    }

    .btn {
        padding: 10px 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
    }

    .confirm { background: linear-gradient(135deg, #1E90FF, #3DA5FF); color: white; }
    .ignore { background: #1d2635; color: white; }

    #map { height: 420px; border-radius: 14px; overflow: hidden; }

    .alert-item {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(61,165,255,0.08);
        padding: 18px;
        border-radius: 14px;
        margin-bottom: 14px;
        line-height: 1.8;
        font-size: 15px;
    }

    input {
        width: 100%;
        padding: 14px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(61,165,255,0.15);
        border-radius: 10px;
        color: white;
        margin-bottom: 14px;
        outline: none;
    }
</style>
</head>
<body>


<div class="topbar">
  <div class="top-left">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <img src="{{ url_for('static', filename='ChatGPT_Image_May_7__2026__05_03_19_PM-removebg-preview.png') }}" class="topbar-logo" alt="ORYX">
  </div>
  
  <div class="admin-profile">
    <i class="fas fa-user-circle"></i>
    <span>Officer</span>
    <i class="fas fa-chevron-down"></i>
  </div>
</div>


<div class="sidebar" id="sidebar">
  <img src="{{ url_for('static', filename='ChatGPT_Image_May_7__2026__05_03_19_PM-removebg-preview.png') }}" class="sidebar-logo" alt="ORYX">

  <button class="active-btn" onclick="showSection('dashboardSection', this)"><i class="fas fa-house"></i> Dashboard</button>
  <button onclick="showSection('patrolSection', this)"><i class="fas fa-user-shield"></i> Patrol Officer</button>
  <button onclick="showSection('mapSection', this)"><i class="fas fa-map"></i> Live Map</button>
  <button onclick="showSection('alertsSection', this)"><i class="fas fa-bell"></i> Alerts</button>
  <button onclick="showSection('systemSection', this)"><i class="fas fa-triangle-exclamation"></i> System Alerts</button>
  <button onclick="showSection('logsSection', this)"><i class="fas fa-clipboard-list"></i> Incident Logs</button>
  <button onclick="showSection('citizenSection', this)"><i class="fas fa-user-plus"></i> Add Citizen</button>

  <div style="margin-top:auto; padding-top:20px;">
    <button><i class="fas fa-gear"></i> Settings</button>
    <button onclick="logout()"><i class="fas fa-right-from-bracket"></i> Logout</button>
  </div>
</div>

<div class="main" id="mainContent">

  <div id="dashboardSection" class="card">
    <h3>Dashboard</h3>
    <p>Welcome back, Officer. All systems are operational.</p>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="activePatrols">3</div>
        <p>Active Patrols</p>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:#22c55e" id="alertsToday">12</div>
        <p>Alerts Today</p>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="areaCoverage">87%</div>
        <p>Area Coverage</p>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="officersOnline">4</div>
        <p>Officers Online</p>
      </div>
    </div>

    <div style="margin-top:30px;">
      <h4>Recent Activity</h4>
      <div id="recentActivity" style="margin-top:10px;"></div>
    </div>
  </div>

  <div id="patrolSection" class="card" style="display:none;">
    <h3>Patrol Officer</h3>
    <img id="suspectImg" src="" alt="Suspect">
    <div id="status" class="wanted-badge">UNKNOWN</div>
    <h3 id="name"></h3>
    <p id="risk"></p>
    <p id="nid"></p>
    <div style="margin-top:20px;">
      <button class="btn confirm" onclick="confirmAlert()">Confirm</button>
      <button class="btn ignore" onclick="ignoreAlert()">Ignore</button>
    </div>
  </div>

  <div id="mapSection" class="card" style="display:none;">
    <h3>GPS Status</h3>
    <div id="map"></div>
    <p id="coords" style="margin-top:15px;"></p>
  </div>

  <div id="alertsSection" class="card" style="display:none;">
    <h3>Live Alerts</h3>
    <div id="alertsBox"></div>
  </div>

  <div id="systemSection" class="card" style="display:none;">
    <h3>System Alerts</h3>
    <div id="systemAlerts"></div>
  </div>

  <div id="logsSection" class="card" style="display:none;">
    <h3>Incident Logs</h3>
    <div id="logs"></div>
  </div>

  <div id="citizenSection" class="card" style="display:none;">
    <h3>Add Citizen</h3>
    <input id="c_name" placeholder="Full Name">
    <input id="c_nid" placeholder="National ID">
    <input id="c_location" placeholder="Location">
    <input id="c_image" placeholder="Image URL">
    <button class="btn confirm" onclick="addCitizen()">Add Citizen</button>
  </div>

</div>

<script>
// ====================== NAVIGATION ======================
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("closed");
  document.getElementById("mainContent").classList.toggle("full");
}

function showSection(sectionId, btn){

  document.querySelectorAll('.card').forEach(card => {
      card.style.display = 'none';
  });

  document.getElementById(sectionId).style.display = 'block';

  if(sectionId === "mapSection"){
      setTimeout(()=>{
          map.invalidateSize();
      },300);
  }

  document.querySelectorAll('.sidebar button')
      .forEach(b => b.classList.remove('active-btn'));

  if(btn) btn.classList.add('active-btn');
}

let alertsCount = 12;
let officersOnline = 4;

async function updateDashboardStats(){

const res = await fetch("/dashboard_stats");
const data = await res.json();

document.getElementById("officersOnline").innerText =
data.online;

document.getElementById("alertsToday").innerText =
data.alerts;
document.getElementById("activePatrols").innerText =
data.patrols;
document.getElementById("areaCoverage").innerText =
data.coverage + "%";

}

function logout(){
  localStorage.clear();
  window.location.href = "/";
}

let map = L.map('map').setView([31.95,35.91],13);
setTimeout(()=>{
    map.invalidateSize();
},1000);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

let marker;

function sendLocation(){

navigator.geolocation.getCurrentPosition(

async(pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;
console.log("GPS Accuracy:", pos.coords.accuracy);

if(marker){
map.removeLayer(marker);
}

marker = L.marker([lat,lng]).addTo(map);

map.setView([lat,lng],15);

document.getElementById("coords").innerText =
`Lat: ${lat} | Lng: ${lng}`;

await fetch("/location",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email: localStorage.getItem("email"),
lat: lat,
lng: lng
})
});

}

);

}

sendLocation();


/* SUSPECT */
async function loadSuspect(){
  const res = await fetch("/current_suspect");
  const data = await res.json();
  if(!data) return;

  document.getElementById('suspectImg').src = data.image;
  document.getElementById('name').innerText = data.name;
  document.getElementById('risk').innerText = "Risk: " + data.risk;
  document.getElementById('nid').innerText = "ID: " + data.nid;

  const statusEl = document.getElementById('status');
  statusEl.innerText = data.status || "UNKNOWN";
}

/* SYSTEM ALERTS */
async function loadSystemAlerts(){
  const res = await fetch("/system_alerts");
  const data = await res.json();
  let html = "";
  if(data.length === 0){
    html = "<p style='opacity:0.5'>No system alerts</p>";
  } else {
    data.forEach(a=>{
      html += `<div class="alert-item">⚠ ${a.message}</div>`;
    });
  }
  document.getElementById("systemAlerts").innerHTML = html;
}

async function addCitizen(){
  await fetch("/add_citizen",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("c_name").value,
      nid: document.getElementById("c_nid").value,
      location: document.getElementById("c_location").value,
      image: document.getElementById("c_image").value
    })
  });
  alert("Citizen Added ✅");
}

async function loadLogs(){
  const res = await fetch("/logs");
  const data = await res.json();
  let html = "";
  const latest = data.reverse().slice(0,5);
  latest.forEach(l=>{
    html += `
      <div class="alert-item">
        <b>${l.username || l.user || "👤 Unknown"}</b> | ${l.event} 
        <small>(${l.time || ""})</small>
      </div>
    `;
  });
  document.getElementById("logs").innerHTML = html;
  document.getElementById("recentActivity").innerHTML = html || "<p style='opacity:0.6'>No recent activity</p>";
}

async function loadAlerts(){
  const res = await fetch("/alerts");
  const data = await res.json();
  let html = "";
  data.forEach(a=>{
    if(a.status === "IGNORED") return;
    html += `
      <div class="alert-item">
        ⚠ ${a.message}
        <br><br>
        <button onclick="markRead('${a._id}')" class="btn confirm">Mark Read</button>
        <button onclick="ignoreAlertItem('${a._id}')" class="btn ignore">Ignore</button>
      </div>
    `;
  });
  document.getElementById("alertsBox").innerHTML = html;
  alertsCount = data.length;
  updateDashboardStats();
}

async function markRead(id){
  await fetch("/mark_alert_read",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({id: id, user: localStorage.getItem("email")})
  });
  loadAlerts();
}

async function ignoreAlertItem(id){
  await fetch("/ignore_alert_item",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({id: id, user: localStorage.getItem("email")})
  });
  loadAlerts();
}

function confirmAlert(){
  fetch("/confirm_alert",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({user: localStorage.getItem("email")})
  });
}

function ignoreAlert(){
  fetch("/ignore_alert",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({user: localStorage.getItem("email")})
  });
}

setInterval(sendLocation,5000);
setInterval(loadSuspect,7000);
setInterval(loadAlerts,4000);
setInterval(loadSystemAlerts,6000);
setInterval(loadLogs,5000);


window.onload = () => {

  sendLocation();

  loadSuspect();
  loadAlerts();
  loadSystemAlerts();
  loadLogs();

  document.getElementById('dashboardSection').style.display = 'block';

  updateDashboardStats();
};
</script>
</body>
</html>
